[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
upload_port = COM4
monitor_speed = 115200

; use a newer toolchain version that supports C++20
platform_packages =
    toolchain-xtensa-esp32 @ 12.2.0+20230208

lib_deps =
    teemuatlut/TMCStepper@^0.7.3
    ESP32Servo@^3.1.3
    hasenradball/LCD-I2C@^1.0.1

build_unflags = 
    -std=gnu++11
    -std=gnu++17

build_flags =
    -std=gnu++20
    -DCORE_DEBUG_LEVEL=3
    -Wno-attributes  ; Suppress the FreeRTOS attribute warnings